syntax = "proto3";

package com.agriyield.investmentservice.grpc;

option java_package = "com.agriyield.investmentservice.grpc";
option java_outer_classname = "InvestmentServiceProto";
option java_multiple_files = false;

service InvestmentService {
    rpc GetInvestmentById     (InvestmentIdRequest)  returns (InvestmentResponse);
    rpc GetInvestmentByFarmId (FarmIdRequest)        returns (InvestmentResponse);
    rpc VerifyInvestmentFunded (InvestmentIdRequest) returns (FundedResponse);
}

message InvestmentIdRequest {
    string investment_id = 1;
}

message FarmIdRequest {
    string farm_id = 1;
}

message InvestmentResponse {
    string id              = 1;
    string investor_id     = 2;
    string farm_id         = 3;
    string farmer_id       = 4;
    string input_need_id   = 5;
    double amount_etb      = 6;
    string status          = 7;
    string crop_type       = 8;
    string region          = 9;
    string created_at      = 10;
}

message FundedResponse {
    bool   is_funded     = 1;
    string investment_id = 2;
    string status        = 3;
}
