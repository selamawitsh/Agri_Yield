syntax = "proto3";

package com.agriyield.fayda;

option java_package = "com.agriyield.userservice.infrastructure.adapter.outgoing.client.grpc";
option java_outer_classname = "FaydaServiceProto";

service FaydaService {
    rpc VerifyIdentity (VerifyIdentityRequest) returns (VerifyIdentityResponse);
    rpc PullKycData (PullKycDataRequest) returns (PullKycDataResponse);
}

message VerifyIdentityRequest {
    string fayda_id = 1;
    string phone = 2;
    string full_name = 3;
}

message VerifyIdentityResponse {
    bool verified = 1;
    string message = 2;
}

message PullKycDataRequest {
    string fayda_id = 1;
}

message PullKycDataResponse {
    string fayda_id = 1;
    string full_name = 2;
    string date_of_birth = 3;
    string region = 4;
    bool verified = 5;
}
