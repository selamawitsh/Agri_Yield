version: '3.8'

services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/agriyield_user_db
      - SPRING_DATASOURCE_USERNAME=agriyield
      - SPRING_DATASOURCE_PASSWORD=agriyield123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-agriyield-platform-secret-key-must-be-256-bits-long-2024!}
      - FAYDA_MOCK_ENABLED=true
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - service-discovery
    networks:
      - agriyield-network
    restart: unless-stopped

networks:
  agriyield-network:
    external: true
