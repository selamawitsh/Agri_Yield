version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agriyield-postgres
    environment:
      POSTGRES_USER: agriyield
      POSTGRES_PASSWORD: agriyield123
      POSTGRES_DB: agriyield_user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agriyield-network

  redis:
    image: redis:7-alpine
    container_name: agriyield-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - agriyield-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: agriyield-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: agriyield
      RABBITMQ_DEFAULT_PASS: agriyield123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - agriyield-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  agriyield-network:
    driver: bridge
