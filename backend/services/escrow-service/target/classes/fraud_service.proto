syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.agriyield.fraudservice.grpc";
option java_outer_classname = "FraudServiceProto";

package fraud;

/* =========================================================
   Fraud Service
   ========================================================= */

service FraudService {

  // FR-02
  rpc ValidateImageMetadata(ImageMetadataRequest)
      returns (ValidationResponse);

  // FR-03
  rpc ValidateVoucherRedemption(VoucherRedemptionRequest)
      returns (DuplicateRedemptionResponse);

  // FR-04
  rpc ValidateQrSignature(QrSignatureRequest)
      returns (ValidationResponse);

  // FR-05
  rpc DetectSuspiciousGps(GpsRequest)
      returns (GpsAnomalyResponse);

  // FR-10
  rpc ValidateMerchantEligibility(MerchantEligibilityRequest)
      returns (MerchantEligibilityResponse);
}

/* =========================================================
   Common Responses
   ========================================================= */

message ValidationResponse {
  bool valid = 1;
  string failureReason = 2;
}

/* =========================================================
   FR-02 Validate Image Metadata
   ========================================================= */

message ImageMetadataRequest {
  string farmId = 1;
  string entityId = 2;
  double photoLat = 3;
  double photoLng = 4;
  string photoTimestamp = 5;
}

/* =========================================================
   FR-03 Validate Voucher Redemption
   ========================================================= */

message VoucherRedemptionRequest {
  string voucherCode = 1;
  string merchantId = 2;
}

message DuplicateRedemptionResponse {
  bool isDuplicate = 1;
  string firstScanTimestamp = 2;
  string failureReason = 3;
}

/* =========================================================
   FR-04 Validate QR Signature
   ========================================================= */

message QrSignatureRequest {
  string voucherCode = 1;
  string qrPayload = 2;
  string signature = 3;
}

/* =========================================================
   FR-05 Detect Suspicious GPS
   ========================================================= */

message GpsRequest {
  string entityId = 1;
  string entityType = 2;
  double latitude = 3;
  double longitude = 4;
  string context = 5;
}

message GpsAnomalyResponse {
  bool suspicious = 1;
  double distanceKm = 2;
  double timeDeltaMinutes = 3;
  string failureReason = 4;
}

/* =========================================================
   FR-10 Validate Merchant Eligibility
   ========================================================= */

message MerchantEligibilityRequest {
  string merchantId = 1;
}

message MerchantEligibilityResponse {
  bool eligible = 1;
  string failureReason = 2;
  double fraudScore = 3;
}