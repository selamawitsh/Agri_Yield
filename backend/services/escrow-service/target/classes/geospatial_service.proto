syntax = "proto3";

package com.agriyield.geospatialservice.grpc;

option java_package = "com.agriyield.geospatialservice.grpc";
option java_outer_classname = "GeospatialServiceProto";
option java_multiple_files = false;

service GeospatialService {
    rpc StartMonitoring         (FarmIdRequest)              returns (BooleanResponse);
    rpc RegisterFarmPolygon     (RegisterFarmPolygonRequest) returns (RegisterFarmPolygonResponse);
    rpc ValidatePolygon         (ValidatePolygonRequest)     returns (ValidatePolygonResponse);
    rpc CalculateFarmArea       (FarmIdRequest)              returns (CalculateFarmAreaResponse);
    rpc DetectSpatialOverlap    (DetectSpatialOverlapRequest) returns (DetectSpatialOverlapResponse);
    rpc GetLatestNdvi           (FarmIdRequest)              returns (NdviResponse);
    rpc GetNdviTimeSeries       (NdviTimeSeriesRequest)      returns (NdviTimeSeriesResponse);
    rpc PredictHarvestReadiness (FarmIdRequest)              returns (HarvestReadinessResponse);
    rpc GetFarmContext          (FarmIdRequest)              returns (FarmContextResponse);
    rpc VerifyFarmBoundary      (VerifyBoundaryRequest)      returns (BoundaryVerificationResponse);
}

message FarmIdRequest {
    string farm_id = 1;
}

message BooleanResponse {
    bool success = 1;
}

message NdviResponse {
    string farm_id       = 1;
    double ndvi_value    = 2;
    double cloud_coverage = 3;
    string health_status  = 4;
    string recorded_date  = 5;
}

message NdviTimeSeriesRequest {
    string farm_id    = 1;
    int32  limit_days = 2;
}

message NdviDataPoint {
    string date          = 1;
    double ndvi_value    = 2;
    double cloud_coverage = 3;
}

message NdviTimeSeriesResponse {
    string              farm_id  = 1;
    repeated NdviDataPoint readings = 2;
}

message HarvestReadinessResponse {
    bool   is_ready              = 1;
    string estimated_date_from   = 2;
    string estimated_date_to     = 3;
    double current_ndvi          = 4;
    double peak_ndvi             = 5;
    string readiness_signal      = 6;
}

message FarmContextResponse {
    string farm_id                      = 1;
    string farmer_id                    = 2;
    string crop_type                    = 3;
    double area_hectares                = 4;
    string region                       = 5;
    string kebele_code                  = 6;
    double gps_centroid_lat             = 7;
    double gps_centroid_lng             = 8;
    int32  agri_score                   = 9;
    string crop_cycle_id                = 10;
    string season_name                  = 11;
    string crop_cycle_status            = 12;
    double current_ndvi                 = 13;
    string ndvi_health_status           = 14;
    double predicted_yield_mean_quintals = 15;
    int32  yield_confidence_pct         = 16;
}

message VerifyBoundaryRequest {
    string farm_id    = 1;
    double photo_lat  = 2;
    double photo_lng  = 3;
}

message BoundaryVerificationResponse {
    bool   is_within_boundary      = 1;
    double distance_from_boundary_m = 2;
    string geo_json_polygon        = 3;
}

message RegisterFarmPolygonRequest {
    string farm_id          = 1;
    string geo_json_polygon = 2;
    double centroid_lat     = 3;
    double centroid_lng     = 4;
    double area_hectares    = 5;
}

message RegisterFarmPolygonResponse {
    bool   success          = 1;
    string message          = 2;
    double area_hectares    = 3;
}

message ValidatePolygonRequest {
    string geo_json_polygon = 1;
}

message ValidatePolygonResponse {
    bool   valid            = 1;
    string message          = 2;
    double area_hectares    = 3;
    double centroid_lat     = 4;
    double centroid_lng     = 5;
}

message CalculateFarmAreaResponse {
    string farm_id          = 1;
    double area_hectares    = 2;
    double area_sq_km         = 3;
}

message DetectSpatialOverlapRequest {
    string farm_id          = 1;
    string geo_json_polygon = 2;
    double centroid_lat     = 3;
    double centroid_lng     = 4;
}

message DetectSpatialOverlapResponse {
    bool   has_overlap           = 1;
    double overlap_percentage    = 2;
    string conflicting_farm_id   = 3;
    string message               = 4;
}
